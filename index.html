<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soar Forecaster</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪂</text></svg>">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-row">
        <h1>Soar Forecaster</h1>
        <button id="toggle-settings" class="toggle-settings-btn">Settings</button>
      </div>
    </header>

    <div id="top-bar" class="top-bar">
      <div id="location-panel"></div>
      <div id="controls-panel"></div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Loading forecast data...</span>
    </div>

    <div class="tables-wrapper">
      <div class="table-section">
        <div id="gfs-table" class="table-container"></div>
      </div>
      <div class="table-section">
        <div id="icon-table" class="table-container"></div>
      </div>
    </div>
  </div>

  <div id="layout-settings" class="layout-settings hidden">
    <div class="layout-settings-inner">
      <span class="section-title">Layout</span>
      <label class="inline-label">Col W
        <input type="range" id="layout-cell-width" min="16" max="70" value="34" class="range-input">
        <span id="layout-cell-width-val">34</span>
      </label>
      <label class="inline-label">Row H
        <input type="range" id="layout-cell-height" min="8" max="50" value="28" class="range-input">
        <span id="layout-cell-height-val">28</span>
      </label>
      <label class="inline-label">Hdr H
        <input type="range" id="layout-header-height" min="14" max="70" value="42" class="range-input">
        <span id="layout-header-height-val">42</span>
      </label>
      <label class="inline-label">Label W
        <input type="range" id="layout-alt-width" min="20" max="100" value="60" class="range-input">
        <span id="layout-alt-width-val">60</span>
      </label>
      <label class="inline-label">Font
        <input type="range" id="layout-font-size" min="5" max="16" value="11" class="range-input">
        <span id="layout-font-size-val">11</span>
      </label>
      <label class="inline-label">Hdr Font
        <input type="range" id="layout-header-font-size" min="5" max="14" value="9" class="range-input">
        <span id="layout-header-font-size-val">9</span>
      </label>
      <label class="inline-label">Pad
        <input type="range" id="layout-cell-pad" min="0" max="6" value="2" class="range-input">
        <span id="layout-cell-pad-val">2</span>
      </label>
      <label class="inline-label">Arrow
        <input type="range" id="layout-arrow-size" min="4" max="18" value="10" class="range-input">
        <span id="layout-arrow-size-val">10</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="layout-cell-borders"> Cell Borders
      </label>
    </div>
    <button id="layout-toggle" class="layout-toggle-btn">Layout Settings</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
