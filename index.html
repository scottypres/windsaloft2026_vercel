<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soar Forecaster</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪂</text></svg>">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-row">
        <h1>Soar Forecaster</h1>
        <div class="view-dropdown" id="view-dropdown">
          <button class="view-dropdown-btn" id="view-dropdown-btn">Wind <span class="dropdown-caret">&#9662;</span></button>
          <div class="view-dropdown-menu hidden" id="view-dropdown-menu">
            <button class="view-dropdown-item active" data-view="wind">Wind</button>
            <button class="view-dropdown-item" data-view="temp">Temp</button>
            <button class="view-dropdown-item" data-view="clouds">Clouds</button>
            <button class="view-dropdown-item" data-view="ensemble">Ensemble</button>
          </div>
        </div>
        <button id="toggle-settings" class="toggle-settings-btn">Settings</button>
      </div>
    </header>

    <div id="top-bar" class="top-bar">
      <div id="location-panel"></div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Loading forecast data...</span>
    </div>

    <div class="tables-wrapper">
      <div class="table-section" data-model="hrrr" data-sync-group="global">
        <div id="hrrr-table" class="table-container"></div>
      </div>
      <div class="table-section" data-model="ecmwf" data-sync-group="global">
        <div id="ecmwf-table" class="table-container"></div>
      </div>
      <div class="table-section" data-model="gfs_seamless" data-sync-group="global">
        <div id="gfs-seamless-table" class="table-container"></div>
      </div>
      <div class="table-section" data-model="icon" data-sync-group="global">
        <div id="icon-table" class="table-container"></div>
      </div>
      <div class="table-section" data-model="nam" data-sync-group="global">
        <div id="nam-table" class="table-container"></div>
      </div>
      <!-- Ensemble tables (hidden until ensemble view is active) -->
      <div class="table-section ensemble-section hidden" data-model="gefs" data-sync-group="ensemble">
        <div id="gefs-table" class="table-container"></div>
      </div>
      <div class="table-section ensemble-section hidden" data-model="ecmwf_ens" data-sync-group="ensemble">
        <div id="ecmwf-ens-table" class="table-container"></div>
      </div>
    </div>
  </div>

  <div id="bottom-settings" class="bottom-settings hidden">
    <div class="bottom-settings-inner">
      <!-- Filters Section -->
      <div class="settings-section" id="section-filters">
        <button class="section-header" data-section="filters">Filters</button>
        <div class="section-body">
          <label class="toggle-label"><input type="checkbox" id="daylight-filter"> Daylight Only</label>
          <label class="toggle-label"><input type="checkbox" id="hide-high-alt"> Hide &gt;5k ft</label>
          <label class="toggle-label"><input type="checkbox" id="wind-shear"> Wind Shear</label>
          <label class="toggle-label"><input type="checkbox" id="fog-mode"> Fog Mode</label>
          <label class="toggle-label">
            <input type="checkbox" id="best-hours"> Best Hours
            <input type="number" id="best-hours-threshold" value="15" min="1" max="50" class="small-input"> mph
          </label>
        </div>
      </div>

      <!-- Extra Rows Section -->
      <div class="settings-section" id="section-extra-rows">
        <button class="section-header" data-section="extra-rows">Extra Rows</button>
        <div class="section-body">
          <label class="toggle-label"><input type="checkbox" data-supp="gusts"> Gusts</label>
          <label class="toggle-label"><input type="checkbox" data-supp="cape"> CAPE</label>
          <label class="toggle-label"><input type="checkbox" data-supp="liftedIndex"> Lift Index</label>
          <label class="toggle-label"><input type="checkbox" data-supp="precipProb"> Precip %</label>
          <label class="toggle-label"><input type="checkbox" data-supp="precipInches"> Precip in</label>
          <label class="toggle-label"><input type="checkbox" data-supp="temp"> Temp</label>
          <label class="toggle-label"><input type="checkbox" data-supp="humidity"> Humidity</label>
          <label class="toggle-label"><input type="checkbox" data-supp="dewpointSpread"> DP Spread</label>
          <label class="toggle-label"><input type="checkbox" data-supp="visibility"> Visibility</label>
          <label class="toggle-label"><input type="checkbox" data-supp="cloudCover"> Clouds</label>
          <label class="toggle-label"><input type="checkbox" data-supp="cloudLow"> Low Cld</label>
          <label class="toggle-label"><input type="checkbox" data-supp="cloudMid"> Mid Cld</label>
          <label class="toggle-label"><input type="checkbox" data-supp="cloudHigh"> High Cld</label>
        </div>
      </div>

      <!-- Models Section -->
      <div class="settings-section" id="section-models">
        <button class="section-header" data-section="models">Models &amp; Forecast</button>
        <div class="section-body">
          <label class="toggle-label model-toggle">
            <input type="checkbox" data-model-toggle="hrrr" checked> HRRR
            <input type="range" data-model-days="hrrr" min="1" max="3" value="3" class="range-input">
            <span data-model-days-val="hrrr">3</span>d
          </label>
          <label class="toggle-label model-toggle">
            <input type="checkbox" data-model-toggle="ecmwf" checked> ECMWF
            <input type="range" data-model-days="ecmwf" min="1" max="15" value="10" class="range-input">
            <span data-model-days-val="ecmwf">10</span>d
          </label>
          <label class="toggle-label model-toggle">
            <input type="checkbox" data-model-toggle="gfs_seamless" checked> GFS
            <input type="range" data-model-days="gfs_seamless" min="1" max="14" value="7" class="range-input">
            <span data-model-days-val="gfs_seamless">7</span>d
          </label>
          <label class="toggle-label model-toggle">
            <input type="checkbox" data-model-toggle="icon" checked> ICON
            <input type="range" data-model-days="icon" min="1" max="7" value="5" class="range-input">
            <span data-model-days-val="icon">5</span>d
          </label>
          <label class="toggle-label model-toggle">
            <input type="checkbox" data-model-toggle="nam" checked> NAM
            <input type="range" data-model-days="nam" min="1" max="4" value="4" class="range-input">
            <span data-model-days-val="nam">4</span>d
          </label>
        </div>
      </div>

      <!-- Layout button opens popup -->
      <div class="settings-section">
        <button class="section-header" id="open-layout-popup">Layout</button>
      </div>

      <!-- Wind Colors Section -->
      <div class="settings-section" id="section-wind-colors">
        <button class="section-header" data-section="wind-colors">Wind Colors</button>
        <div class="section-body">
          <div class="wind-threshold-row">
            <label class="inline-label">Blue ≤
              <input type="number" id="wt-calm" value="8" min="1" max="50" class="small-input">
            </label>
            <label class="inline-label">Green ≤
              <input type="number" id="wt-moderate" value="15" min="1" max="80" class="small-input">
            </label>
            <label class="inline-label">Red ≥
              <input type="number" id="wt-strong" value="20" min="1" max="100" class="small-input">
            </label>
          </div>
          <div id="wind-gradient-preview" class="wind-gradient-preview"></div>
        </div>
      </div>
      <div class="settings-section settings-reset">
        <button id="reset-defaults" class="action-btn danger-btn">Reset Defaults</button>
      </div>
    </div>
    <button id="bottom-settings-toggle" class="bottom-settings-toggle-btn">Settings</button>
  </div>

  <!-- Layout Popup -->
  <div id="layout-popup" class="layout-popup hidden">
    <div class="layout-popup-backdrop"></div>
    <div class="layout-popup-panel">
      <div class="layout-popup-header">
        <span>Layout</span>
        <button id="layout-popup-done" class="layout-popup-done-btn">Done</button>
      </div>
      <div class="layout-popup-body">
        <label class="inline-label">Col W
          <input type="range" id="layout-cell-width" min="8" max="70" value="34" class="range-input">
          <span id="layout-cell-width-val">34</span>
        </label>
        <label class="inline-label">Row H
          <input type="range" id="layout-cell-height" min="8" max="50" value="28" class="range-input">
          <span id="layout-cell-height-val">28</span>
        </label>
        <label class="inline-label">Hdr H
          <input type="range" id="layout-header-height" min="10" max="70" value="42" class="range-input">
          <span id="layout-header-height-val">42</span>
        </label>
        <label class="inline-label">Label W
          <input type="range" id="layout-alt-width" min="10" max="100" value="60" class="range-input">
          <span id="layout-alt-width-val">60</span>
        </label>
        <label class="inline-label">Font
          <input type="range" id="layout-font-size" min="4" max="16" value="11" class="range-input">
          <span id="layout-font-size-val">11</span>
        </label>
        <label class="inline-label">Hdr Font
          <input type="range" id="layout-header-font-size" min="4" max="14" value="9" class="range-input">
          <span id="layout-header-font-size-val">9</span>
        </label>
        <label class="inline-label">Pad
          <input type="range" id="layout-cell-pad" min="0" max="6" value="2" class="range-input">
          <span id="layout-cell-pad-val">2</span>
        </label>
        <label class="inline-label">Extra Font
          <input type="range" id="layout-supp-font-size" min="4" max="14" value="9" class="range-input">
          <span id="layout-supp-font-size-val">9</span>
        </label>
        <label class="inline-label">Arrow
          <input type="range" id="layout-arrow-size" min="0" max="18" value="10" class="range-input">
          <span id="layout-arrow-size-val">10</span>
        </label>
        <label class="inline-label">Arrow Gap
          <input type="range" id="layout-arrow-gap" min="-4" max="6" value="0" class="range-input">
          <span id="layout-arrow-gap-val">0</span>
        </label>
        <label class="inline-label">Arrow Style
          <select id="layout-arrow-style" class="select-input">
            <option value="classic">Classic</option>
            <option value="triangle">Triangle</option>
            <option value="thin">Thin</option>
            <option value="dot">Dot</option>
            <option value="chevron">Chevron</option>
          </select>
        </label>
        <label class="inline-label">Gap
          <input type="range" id="layout-table-gap" min="0" max="24" value="8" class="range-input">
          <span id="layout-table-gap-val">8</span>
        </label>
        <label class="inline-label">Border
          <input type="range" id="layout-border-width" min="0" max="3" value="0.5" step="0.5" class="range-input">
          <span id="layout-border-width-val">0.5</span>
        </label>
        <label class="inline-label">Day Sep
          <input type="range" id="layout-day-border-width" min="0" max="6" value="3" class="range-input">
          <span id="layout-day-border-width-val">3</span>
        </label>
        <label class="toggle-label"><input type="checkbox" id="layout-cell-borders"> Cell Borders</label>
        <button id="layout-reset" class="small-btn danger-btn" style="margin-top:0.5rem">Reset Layout</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
